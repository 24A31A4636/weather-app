<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <div class="search">
            <input type="text" placeholder="Enter city name" spellcheck="false">
            <button><img src="https://cdn-icons-png.flaticon.com/512/482/482631.png" alt="search" width="20px"></button>
        </div>
        
        <div class="weather">
            <img src="https://openweathermap.org/img/wn/01d@2x.png" class="weather-icon" alt="weather-icon">
            <h1 class="temp">22°C</h1>
            <h2 class="city">New York</h2>
            
            <div class="details">
                <div class="col">
                    <p class="humidity">50%</p>
                    <p>Humidity</p>
                </div>
                <div class="col">
                    <p class="wind">15 km/h</p>
                    <p>Wind Speed</p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
